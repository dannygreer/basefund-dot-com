<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basefund — Icon Library</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#145DD0; --blue-lt:#28A4DD; --blue-deep:#0B3580;
  --blue-pale:#DDEEFF; --blue-tint:#EEF5FF;
  --white:#FFFFFF; --off:#F7F8FA;
  --ink:#2B2B2B; --slate:#5C6680; --slate-lt:#8B96AE;
  --border:rgba(0,0,0,.07);
  --f-head:'Lora',Georgia,serif; --f-body:'Inter',-apple-system,sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --r-sm:6px; --r-md:12px; --r-lg:20px; --r-xl:24px; --r-pill:100px;
  --s-sm:0 2px 8px rgba(20,93,208,.10);
  --s-md:0 6px 20px rgba(20,93,208,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;font-size:16px;scroll-behavior:smooth;}
body{font-family:var(--f-body);background:#F7F8FA;color:var(--ink);overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* ── PAGE HEADER ── */
.page-header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-mark {
  width: 32px;
  height: 32px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--blue-deep), var(--blue-lt));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.5px;
  flex-shrink: 0;
}
.header-title {
  font-family: var(--f-head);
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -.02em;
}
.header-divider {
  width: 1px;
  height: 18px;
  background: var(--border);
}
.header-sub {
  font-size: 12px;
  color: var(--slate-lt);
  font-weight: 500;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.back-link {
  font-size: 13px;
  font-weight: 500;
  color: var(--slate);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: #fff;
  transition: all 150ms;
}
.back-link:hover {
  color: var(--blue);
  border-color: rgba(20,93,208,.25);
  background: var(--blue-tint);
}
.back-link svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── SEARCH BAR ── */
.search-bar {
  position: sticky;
  top: 64px;
  z-index: 100;
  background: #F7F8FA;
  border-bottom: 1px solid var(--border);
  padding: 14px 48px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 520px;
}
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  stroke: var(--slate-lt);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  pointer-events: none;
}
.search-input {
  width: 100%;
  height: 42px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-pill);
  background: #fff;
  padding: 0 16px 0 44px;
  font-family: var(--f-body);
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 180ms, box-shadow 180ms;
}
.search-input::placeholder { color: var(--slate-lt); }
.search-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(20,93,208,.10), var(--s-sm);
}
.search-clear {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--slate-lt);
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: background 150ms;
}
.search-clear.visible { display: flex; }
.search-clear:hover { background: var(--slate); }
.search-clear svg {
  width: 10px;
  height: 10px;
  stroke: #fff;
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
}
.results-count {
  font-size: 12px;
  color: var(--slate-lt);
  white-space: nowrap;
  font-weight: 500;
}
.results-count strong {
  color: var(--slate);
  font-weight: 600;
}

/* ── MAIN CONTENT ── */
.content {
  max-width: 1600px;
  margin: 0 auto;
  padding: 40px 48px 80px;
}

/* ── CATEGORY SECTION ── */
.cat-section {
  margin-bottom: 52px;
}
.cat-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.cat-name {
  font-family: var(--f-head);
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -.02em;
}
.cat-count {
  font-size: 11px;
  font-weight: 600;
  color: var(--blue);
  background: var(--blue-tint);
  padding: 2px 9px;
  border-radius: var(--r-pill);
  letter-spacing: .02em;
}
.cat-section.hidden { display: none; }

/* ── ICON GRID ── */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
}

/* ── ICON CARD ── */
.icon-card {
  background: #fff;
  border-radius: var(--r-md);
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
  padding: 16px 8px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: transform 200ms var(--ease), box-shadow 200ms var(--ease), background 150ms;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  overflow: hidden;
}
.icon-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(20,93,208,.13), 0 1px 4px rgba(20,93,208,.08);
  background: var(--blue-tint);
}
.icon-card:active {
  transform: translateY(0);
  box-shadow: 0 1px 4px rgba(20,93,208,.08);
}
.icon-card.hidden { display: none; }
.icon-img-wrap {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.icon-img-wrap img {
  width: 24px;
  height: 24px;
  display: block;
}
.icon-label {
  font-size: 10px;
  color: var(--slate);
  text-align: center;
  line-height: 1.35;
  word-break: break-word;
  max-width: 100%;
  font-weight: 500;
  letter-spacing: -.01em;
}

/* ── EMPTY STATE ── */
.empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 80px 0;
  text-align: center;
}
.empty-state.visible { display: flex; }
.empty-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--r-lg);
  background: var(--blue-tint);
  display: flex;
  align-items: center;
  justify-content: center;
}
.empty-icon svg {
  width: 22px;
  height: 22px;
  stroke: var(--blue);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
}
.empty-title {
  font-family: var(--f-head);
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
}
.empty-sub { font-size: 14px; color: var(--slate-lt); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: var(--r-pill);
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms, transform 200ms var(--ease);
  white-space: nowrap;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast-check {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #22C55E;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.toast-check svg {
  width: 9px;
  height: 9px;
  stroke: #fff;
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>
</head>

<!-- PAGE HEADER -->
<header class="page-header">

  <div class="header-right">

    </button>
  </div>
  <div class="results-count" id="resultsCount">
    Showing <strong>1,173</strong> of 1,173 icons
  </div>
</div>

<!-- MAIN CONTENT -->
<main class="content" id="content">

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <p class="empty-title">No icons found</p>
    <p class="empty-sub">Try a different search term</p>

</main>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-check">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <span id="toastText">Copied!</span>
</div>

    }
  ];

  const TOTAL = 1173;

  // ── BUILD DOM ──────────────────────────────────────────────────────────────
  const content = document.getElementById('content');
  const emptyState = document.getElementById('emptyState');

  CATEGORIES.forEach(function (cat) {
    var section = document.createElement('section');
    section.className = 'cat-section';
    section.dataset.cat = cat.name;

    var header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML =
      '<span class="cat-name">' + cat.name + '</span>' +
      '<span class="cat-count" data-count>' + cat.icons.length + '</span>';
    section.appendChild(header);

    var grid = document.createElement('div');
    grid.className = 'icon-grid';

    cat.icons.forEach(function (icon) {
      var card = document.createElement('div');
      card.className = 'icon-card';
      card.dataset.name = icon;
      card.setAttribute('title', icon);

      var wrap = document.createElement('div');
      wrap.className = 'icon-img-wrap';
      var img = document.createElement('img');
      img.src = 'icons/' + icon + '.svg';
      img.alt = icon;
      img.width = 24;
      img.height = 24;
      img.loading = 'lazy';
      wrap.appendChild(img);

      var label = document.createElement('span');
      label.className = 'icon-label';
      label.textContent = icon.replace(/-/g, ' ');

      card.appendChild(wrap);
      card.appendChild(label);
      card.addEventListener('click', function () { copyIcon(icon); });
      grid.appendChild(card);
    });

    section.appendChild(grid);
    content.insertBefore(section, emptyState);
  });

  // ── SEARCH ──────────────────────────────────────────────────────────────────
  var searchInput = document.getElementById('searchInput');
  var searchClear = document.getElementById('searchClear');
  var resultsCount = document.getElementById('resultsCount');
  var allCards = document.querySelectorAll('.icon-card');
  var allSections = document.querySelectorAll('.cat-section');

  function updateSearch() {
    var q = searchInput.value.trim().toLowerCase().replace(/\s+/g, '-');
    var visible = 0;

    searchClear.classList.toggle('visible', searchInput.value.length > 0);

    allSections.forEach(function (section) {
      var cards = section.querySelectorAll('.icon-card');
      var sectionVisible = 0;

      cards.forEach(function (card) {
        var name = card.dataset.name;
        var match = q === '' || name.includes(q) || name.replace(/-/g, ' ').includes(searchInput.value.trim().toLowerCase());
        if (match) {
          card.classList.remove('hidden');
          sectionVisible++;
          visible++;
        } else {
          card.classList.add('hidden');
        }
      });

      var countEl = section.querySelector('[data-count]');
      if (countEl) {
        countEl.textContent = sectionVisible;
      }

      section.classList.toggle('hidden', sectionVisible === 0);
    });

    var countStr = visible.toLocaleString();
    resultsCount.innerHTML = 'Showing <strong>' + countStr + '</strong> of ' + TOTAL.toLocaleString() + ' icons';
    emptyState.classList.toggle('visible', visible === 0);
  }

  searchInput.addEventListener('input', updateSearch);
  searchClear.addEventListener('click', function () {
    searchInput.value = '';
    searchInput.focus();
    updateSearch();
  });
  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      searchInput.value = '';
      updateSearch();
    }
  });

  // ── COPY & TOAST ──────────────────────────────────────────────────────────
  var toast = document.getElementById('toast');
  var toastText = document.getElementById('toastText');
  var toastTimer = null;

  function copyIcon(name) {
    var filename = name + '.svg';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(filename).then(function () {
        showToast('Copied: ' + filename);
      }).catch(function () {
        fallbackCopy(filename);
      });
    } else {
      fallbackCopy(filename);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    showToast('Copied: ' + text);
  }

  function showToast(msg) {
    toastText.textContent = msg;
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toast.classList.remove('show');
    }, 2200);
  }

  // ── KEYBOARD SHORTCUT: / to focus search ─────────────────────────────────
  document.addEventListener('keydown', function (e) {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });

}());
